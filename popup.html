<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncMark</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <img class="icon" src="icons/icon48.png" width="20" height="20" alt="SyncMark logo" />
      <h1>SyncMark</h1>
      <!-- 项目仓库快捷按钮 -->
      <button class="repo-btn" id="repoBtn" title="打开项目仓库 (GitHub)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.79-.26.79-.58v-2.23c-3.34.73-4.03-1.42-4.03-1.42-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.31.76-1.6-2.66-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23.96-.27 1.98-.4 3-.41 1.02.01 2.04.14 3 .41 2.29-1.55 3.3-1.23 3.3-1.23.66 1.65.24 2.87.12 3.17.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.82 1.1.82 2.22v3.29c0 .32.19.69.8.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"></path>
        </svg>
      </button>
      <p>
        <span  style="font-size: 8px;">注意：</span> 
        <span style="font-size: 8px;color: red;">密钥只存本地</span>
      </p>
      <!-- 用户头像和菜单 -->
      <div class="user-menu">
        <div class="user-avatar" id="userAvatar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div class="user-dropdown" id="userDropdown">
          <!-- GitHub 账户信息 -->
          <div class="dropdown-header account-block account-row" id="githubAccount">
            <div class="account-left">
              <img id="githubAvatar" class="account-avatar" src="icons/icon48.png" alt="GitHub Avatar">
              <div class="account-info">
                <div class="user-name" id="githubUserName">未登录</div>
                <div class="user-email" id="githubUserEmail"></div>
              </div>
            </div>
            <div class="account-actions">
              <button class="logout-link" id="logoutGithubBtn">退出 GitHub</button>
              <button class="config-link" id="configGithubBtn" style="display:none;">配置 Token</button>
            </div>
          </div>

          <div class="dropdown-divider"></div>

          <!-- Gitee 账户信息 -->
          <div class="dropdown-header account-block account-row" id="giteeAccount">
            <div class="account-left">
              <img id="giteeAvatar" class="account-avatar" src="icons/icon48.png" alt="Gitee Avatar">
              <div class="account-info">
                <div class="user-name" id="giteeUserName">未登录</div>
                <div class="user-email" id="giteeUserEmail"></div>
              </div>
            </div>
            <div class="account-actions">
              <button class="logout-link" id="logoutGiteeBtn">退出 Gitee</button>
              <button class="config-link" id="configGiteeBtn" style="display:none;">配置 Token</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
      <!-- 主面板 -->
      <div class="main-panel">
        <!-- 信息卡片 - 单行显示 -->
        <div class="info-row">
          <!-- 本地书签数量 -->
          <div class="info-item">
            <svg class="item-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
            </svg>
            <div class="item-content">
              <div class="item-number" id="bookmarkCount">0</div>
              <div class="item-label">本地书签</div>
            </div>
          </div>

          <!-- 分隔线 -->
          <div id="dividerLocalToGithub" class="divider-vertical"></div>

          <!-- GitHub 远程书签数量 -->
          <div class="info-item" id="githubInfoItem" style="display: none;">
            <svg class="item-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            <div class="item-content">
              <div class="item-number" id="githubBookmarkCount">-</div>
              <div class="item-label">GitHub</div>
            </div>
          </div>
          <!-- 分隔线 -->
          <div id="dividerGithubToGitee" class="divider-vertical"></div>
          <!-- Gitee 远程书签数量 -->
          <div class="info-item" id="giteeInfoItem" style="display: none;">
            <svg class="item-icon gitee-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M11.984 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.016 0zm6.09 5.333c.328 0 .593.266.592.593v1.482a.594.594 0 0 1-.593.592H9.777c-.982 0-1.778.796-1.778 1.778v5.63c0 .327.266.592.593.592h5.63c.982 0 1.778-.796 1.778-1.778v-.296a.593.593 0 0 0-.592-.593h-4.037a.594.594 0 0 1-.592-.593v-1.482a.593.593 0 0 1 .592-.593h6.815c.327 0 .593.266.593.593v3.408a4 4 0 0 1-4 4H5.926a.593.593 0 0 1-.593-.593V9.778a4.444 4.444 0 0 1 4.445-4.444h8.296Z"/>
            </svg>
            <div class="item-content">
              <div class="item-number" id="giteeBookmarkCount">-</div>
              <div class="item-label">Gitee</div>
            </div>
          </div>
        </div>

        <!-- 同步状态卡片 -->
        <div class="sync-status-card">
          <div class="status-row">
            <span class="status-label">最后快照</span>
            <span class="status-badge success" id="statusBadge">同步成功</span>
          </div>
          <div class="status-row">
            <span class="status-label">上次同步</span>
            <span class="status-time" id="lastSyncTime">2026/3/31 17:43:04</span>
          </div>
          <!-- 平台级别同步状态 -->
          <div class="status-divider"></div>
          <div class="status-row platform-status" id="githubStatusRow" style="display:none;">
            <span class="status-label">GitHub 同步</span>
            <span class="status-badge" id="githubStatusBadge">未同步</span>
            <span class="status-time" id="githubLastSyncTime" style="margin-left:8px;">-</span>
          </div>
          <div class="status-row platform-status" id="giteeStatusRow" style="display:none;">
            <span class="status-label">Gitee 同步</span>
            <span class="status-badge" id="giteeStatusBadge">未同步</span>
            <span class="status-time" id="giteeLastSyncTime" style="margin-left:8px;">-</span>
          </div>
          <div class="status-divider"></div>
          <div class="status-row">
            <div class="auto-sync-info">
              <span class="status-label">自动同步</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="autoSyncToggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <!-- 提示信息 -->
        <div class="status-notice" id="statusNotice">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          <span id="noticeText">首次同步完成，已上传本书签至远端</span>
        </div>

        <!-- 同步按钮区域 -->
        <div class="sync-section">
          <!-- GitHub 按钮 -->
          <div class="sync-group" id="githubSyncGroup" style="display: none;">
            <div class="sync-header">
              <svg class="platform-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
              </svg>
              <span>GitHub</span>
            </div>
            <button class="sync-btn upload" id="githubUploadButton">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
              本地同步到GitHub
            </button>
            <button class="sync-btn download" id="githubDownloadButton">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
             GitHub同步到本地
            </button>
          </div>

          <!-- Gitee 按钮 -->
          <div class="sync-group" id="giteeSyncGroup" style="display: none;">
            <div class="sync-header">
              <svg class="platform-icon gitee-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M11.984 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.016 0zm6.09 5.333c.328 0 .593.266.592.593v1.482a.594.594 0 0 1-.593.592H9.777c-.982 0-1.778.796-1.778 1.778v5.63c0 .327.266.592.593.592h5.63c.982 0 1.778-.796 1.778-1.778v-.296a.593.593 0 0 0-.592-.593h-4.037a.594.594 0 0 1-.592-.593v-1.482a.593.593 0 0 1 .592-.593h6.815c.327 0 .593.266.593.593v3.408a4 4 0 0 1-4 4H5.926a.593.593 0 0 1-.593-.593V9.778a4.444 4.444 0 0 1 4.445-4.444h8.296Z"/>
              </svg>
              <span>Gitee</span>
            </div>
            <button class="sync-btn upload" id="giteeUploadButton">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
               本地同步到Gitee
            </button>
            <button class="sync-btn download" id="giteeDownloadButton">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              Gitee同步到本地
            </button>
          </div>
        </div>
      </div>

      <!-- 配置侧边栏（默认隐藏） -->
      <div class="config-sidebar" id="configSidebar">
        <div class="config-sidebar-overlay" id="configOverlay"></div>
        <div class="config-sidebar-panel">
          <div class="config-header">
            <span class="config-title">⚙️ 同步配置</span>
            <button class="config-close-btn" id="configCloseBtn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
          <!-- 平台配置 -->
          <div class="config-group">
            <label class="config-label">GitHub Token</label>
            <div class="token-input-group">
              <input type="password" class="config-input" id="githubTokenInput" placeholder="输入 GitHub Token">
              <button class="oauth-quick-btn" id="toggleGithubPasswordBtn" title="显示/隐藏密码">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="githubEyeIcon">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
              <button class="oauth-quick-btn" id="githubQuickBtn" title="快速获取">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                  <polyline points="15 3 21 3 21 9"></polyline>
                  <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
              </button>
            </div>
            <div class="config-help">需要 <code>gist</code> 权限</div>
          </div>

          <div class="config-group">
            <label class="config-label">Gitee Token</label>
            <div class="token-input-group">
              <input type="password" class="config-input" id="giteeTokenInput" placeholder="输入 Gitee Token">
              <button class="oauth-quick-btn" id="toggleGiteePasswordBtn" title="显示/隐藏密码">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="giteeEyeIcon">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
              <button class="oauth-quick-btn" id="giteeQuickBtn" title="快速获取">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                  <polyline points="15 3 21 3 21 9"></polyline>
                  <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
              </button>
            </div>
            <div class="config-help">需要 <code>gists</code> 权限</div>
          </div>

          <!-- 同步频率 -->
          <div class="config-group">
            <label class="config-label">同步频率</label>
            <select class="config-select" id="syncIntervalSelect">
              <option value="60">每小时</option>
              <option value="360">每6小时</option>
              <option value="720">每12小时</option>
              <option value="1440" selected>每天一次</option>
            </select>
          </div>

          <!-- 保存按钮 -->
          <button class="save-config-btn" id="saveConfigBtn">保存配置</button>
        </div>
      </div>
    </div>

    <!-- 底部 -->
    <div class="footer">
      <button class="footer-btn" id="settingsBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 1v6m0 6v6m5.2-13.2l-4.2 4.2m-2 2l-4.2 4.2m13.2-5.2l-6 0m-6 0l-6 0m13.2 5.2l-4.2-4.2m-2-2l-4.2-4.2"></path>
        </svg>
        设置
      </button>
      <div class="version">V1.0.1</div>
      <button class="footer-btn" id="moreBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="19" cy="12" r="1"></circle>
          <circle cx="5" cy="12" r="1"></circle>
        </svg>
        更多
      </button>
      <!-- 更多菜单下拉 -->
      <div class="more-dropdown" id="moreDropdown">
        <button class="dropdown-item" id="clearLocalBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          清空本地书签
        </button>
      </div>
    </div>
  </div>

  <!-- 自定义弹框 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-icon" id="modalIcon"></div>
      <div class="modal-title" id="modalTitle">提示</div>
      <div class="modal-message" id="modalMessage">这是一条消息</div>
      <div class="modal-buttons" id="modalButtons">
        <button class="modal-btn modal-btn-cancel" id="modalCancelBtn">取消</button>
        <button class="modal-btn modal-btn-confirm" id="modalConfirmBtn">确定</button>
      </div>
    </div>
  </div>

  <!-- 全屏加载遮罩（用于配置保存后等待后台验证） -->
  <div id="globalLoading" class="global-loading" style="display:none;">
    <div class="global-loading-content">
      <div class="spinner" aria-hidden="true"></div>
      <div class="global-loading-text">正在验证配置，请稍候...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
